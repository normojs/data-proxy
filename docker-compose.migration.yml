# Disposable databases for local migration gates.
#
# These services are intentionally separate from docker-compose.dev.yml so the
# migration smoke can recreate a clean database without touching a developer's
# running dev stack.

services:
  migration-postgres:
    image: postgres:15-alpine
    container_name: new-api-migration-postgres
    restart: "no"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new_api_migration
    ports:
      - "${MCP_MIGRATION_POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new_api_migration"]
      interval: 2s
      timeout: 3s
      retries: 30

