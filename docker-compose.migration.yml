# Disposable databases for local migration gates.
#
# These services are intentionally separate from docker-compose.dev.yml so the
# migration smoke can recreate a clean database without touching a developer's
# running dev stack.

services:
  migration-postgres:
    image: postgres:15-alpine
    container_name: data-proxy-migration-postgres
    restart: "no"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: data_proxy_migration
    ports:
      - "${MCP_MIGRATION_POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d data_proxy_migration"]
      interval: 2s
      timeout: 3s
      retries: 30

  migration-mysql:
    image: mysql:8.0
    container_name: data-proxy-migration-mysql
    restart: "no"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: data_proxy_migration
    ports:
      - "${MCP_MIGRATION_MYSQL_PORT:-13306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p123456 --silent"]
      interval: 2s
      timeout: 3s
      retries: 45
