# Data Proxy Docker Compose Configuration
#
# Quick Start (lite: SQLite + process-local cache, no Redis):
#   1. docker compose up -d
#   2. Access http://localhost:3000
#   3. Complete the setup wizard (or keep SQLite defaults) and create the
#      first administrator. See docs/deploy-profiles.md.
#   Optional MySQL/PostgreSQL/Redis: use the setup wizard, or
#   docker compose --profile local-deps up -d then point DSN at postgres/redis.
#
# Docker Desktop note:
#   If Data Proxy runs in Docker and your database/Redis runs on this Mac,
#   use host.docker.internal as the host in the setup wizard.
#
# Optional bundled dependencies:
#   docker compose --profile local-deps up -d
#   Then use `postgres` / `redis` as hosts in the setup wizard.
#   These services do not publish host ports, so they will not conflict with
#   PostgreSQL/Redis already running on your machine.

services:
  data-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: data-proxy:latest
    container_name: data-proxy
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
      - DATA_PROXY_PROFILE=lite  # 自用/试用：SQLite + 进程内缓存；生产请改 standard/ha 并配置 SQL_DSN/REDIS
      - ERROR_LOG_ENABLED=true # 是否启用错误日志记录 (Whether to enable error log recording)
      - BATCH_UPDATE_ENABLED=true  # 是否启用批量更新 (Whether to enable batch update)
      - NODE_NAME=data-proxy-node-1  # 节点名称，用于审计日志中标识节点身份；多节点/容器部署时建议设置 (Node name used in audit logs; recommended when running multiple instances or in containers)
#      - STREAMING_TIMEOUT=300  # 流模式无响应超时时间，单位秒，默认120秒，如果出现空补全可以尝试改为更大值 （Streaming timeout in seconds, default is 120s. Increase if experiencing empty completions）
#      - RELAY_IDLE_CONN_TIMEOUT=90  # Relay HTTP 客户端空闲连接超时时间，单位秒，默认跟随 Go 标准库，设置为0表示不限制 (Relay HTTP client idle keep-alive timeout in seconds, defaults to Go standard library; set 0 to disable)
#      - SESSION_SECRET=random_string  # 多机部署时设置，必须修改这个随机字符串！！ （multi-node deployment, set this to a random string!!!!!!!）
#      - SYNC_FREQUENCY=60  # Uncomment if regular database syncing is needed
#      - GOOGLE_ANALYTICS_ID=G-XXXXXXXXXX  # Google Analytics 的测量 ID (Google Analytics Measurement ID)
#      - UMAMI_WEBSITE_ID=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx  # Umami 网站 ID (Umami Website ID)
#      - UMAMI_SCRIPT_URL=https://analytics.umami.is/script.js  # Umami 脚本 URL，默认为官方地址 (Umami Script URL, defaults to official URL)

    networks:
      - data-proxy-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    profiles:
      - local-deps
    restart: always
    command: ["redis-server", "--requirepass", "123456"]
    networks:
      - data-proxy-network

  postgres:
    image: postgres:15
    profiles:
      - local-deps
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: data_proxy
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - data-proxy-network
#    ports:
#      - "5432:5432"  # Uncomment if you need to access PostgreSQL from outside Docker

#  mysql:
#    image: mysql:8.2
#    container_name: data-proxy-mysql
#    profiles:
#      - local-deps
#    restart: always
#    environment:
#      MYSQL_ROOT_PASSWORD: 123456
#      MYSQL_DATABASE: data_proxy
#    volumes:
#      - mysql_data:/var/lib/mysql
#    networks:
#      - data-proxy-network
#    ports:
#      - "3306:3306"  # Uncomment if you need to access MySQL from outside Docker

volumes:
  pg_data:
#  mysql_data:

networks:
  data-proxy-network:
    driver: bridge
