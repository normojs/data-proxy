# Data Proxy — lite（自用 / 试用）
#
# SQLite + 进程内缓存，不启动 PostgreSQL / Redis。
# 文档：docs/deploy-profiles.md
#
# 启动：
#   docker compose -f docker-compose.lite.yml up -d --build
# 或（默认 docker-compose.yml 即 lite）：
#   docker compose up -d --build
#
# 访问：http://localhost:3000

services:
  data-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DATA_PROXY_IMAGE:-data-proxy:latest}
    container_name: data-proxy-lite
    restart: always
    command: --log-dir /app/logs
    ports:
      - "${DATA_PROXY_HOST_PORT:-3000}:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      PORT: "3000"
      DATA_PROXY_PROFILE: lite
      ERROR_LOG_ENABLED: ${ERROR_LOG_ENABLED:-true}
      BATCH_UPDATE_ENABLED: ${BATCH_UPDATE_ENABLED:-true}
      NODE_NAME: ${NODE_NAME:-data-proxy-lite}
      # 试用可不设；多机或生产务必改掉
      SESSION_SECRET: ${SESSION_SECRET:-}
      GIN_MODE: ${GIN_MODE:-release}
      ALLOW_RANDOM_SESSION_SECRET: ${ALLOW_RANDOM_SESSION_SECRET:-true}
    networks:
      - data-proxy-lite
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  data-proxy-lite:
    driver: bridge
