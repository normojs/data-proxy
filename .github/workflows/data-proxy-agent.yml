name: Data Proxy Agent

permissions:
  contents: read

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/data-proxy-agent.yml"
      - "Dockerfile.agent"
      - "cmd/data-proxy-agent/**"
      - "pkg/dpagent/**"
      - "dto/bridge.go"
      - "dto/mcp.go"
      - "go.mod"
      - "go.sum"
      - "LICENSE"
      - "NOTICE"
      - "THIRD-PARTY-LICENSES.md"
      - "README.md"
      - "docs/data-proxy-agent-cli-design.md"
      - "scripts/install-data-proxy-agent.sh"
  pull_request:
    paths:
      - ".github/workflows/data-proxy-agent.yml"
      - "Dockerfile.agent"
      - "cmd/data-proxy-agent/**"
      - "pkg/dpagent/**"
      - "dto/bridge.go"
      - "dto/mcp.go"
      - "go.mod"
      - "go.sum"
      - "LICENSE"
      - "NOTICE"
      - "THIRD-PARTY-LICENSES.md"
      - "README.md"
      - "docs/data-proxy-agent-cli-design.md"
      - "scripts/install-data-proxy-agent.sh"
  workflow_dispatch:
    inputs:
      publish_agent_image:
        description: "Publish the data-proxy-agent Docker image to GHCR"
        required: false
        default: true
        type: boolean
      publish_latest:
        description: "Also publish ghcr.io/<owner>/data-proxy-agent:latest"
        required: false
        default: false
        type: boolean

concurrency:
  group: data-proxy-agent-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.25.1"
          cache-dependency-path: go.sum

      - name: Download Go modules
        run: go mod download

      - name: Run agent tests
        run: go test ./cmd/data-proxy-agent ./pkg/dpagent -count=1

      - name: Build smoke
        run: |
          go build -trimpath -o /tmp/data-proxy-agent ./cmd/data-proxy-agent
          /tmp/data-proxy-agent self-test
          /tmp/data-proxy-agent version

      - name: Check whitespace
        run: git diff --check

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.25.1"
          cache-dependency-path: go.sum

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="sha-${GITHUB_SHA::8}"
          fi
          ARTIFACT="data-proxy-agent-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ steps.meta.outputs.version }}
          ARTIFACT: ${{ steps.meta.outputs.artifact }}
        run: |
          set -euo pipefail
          mkdir -p "dist/${ARTIFACT}"
          BINARY="data-proxy-agent"
          if [ "${GOOS}" = "windows" ]; then
            BINARY="${BINARY}.exe"
          fi
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/${ARTIFACT}/${BINARY}" \
            ./cmd/data-proxy-agent
          cp README.md "dist/${ARTIFACT}/README.md"
          cp docs/data-proxy-agent-cli-design.md "dist/${ARTIFACT}/data-proxy-agent-cli-design.md"
          cp scripts/install-data-proxy-agent.sh "dist/${ARTIFACT}/install-data-proxy-agent.sh"

      - name: Package
        shell: bash
        env:
          ARTIFACT: ${{ steps.meta.outputs.artifact }}
        run: |
          set -euo pipefail
          cd dist
          if [[ "${ARTIFACT}" == *windows* ]]; then
            zip -qr "${ARTIFACT}.zip" "${ARTIFACT}"
            sha256sum "${ARTIFACT}.zip" > "${ARTIFACT}.zip.sha256"
          else
            tar -czf "${ARTIFACT}.tar.gz" "${ARTIFACT}"
            sha256sum "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact }}
          path: dist/${{ steps.meta.outputs.artifact }}.*
          retention-days: 14

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: data-proxy-agent-*
          merge-multiple: true

      - name: Generate checksum index
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          cat ./*.sha256 > checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksum index with cosign
        shell: bash
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --output-signature dist/checksums.txt.sig \
            --bundle dist/checksums.txt.bundle \
            dist/checksums.txt

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.bundle

  image:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_agent_image != 'false')
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve image tags
        id: image
        shell: bash
        env:
          INPUT_PUBLISH_LATEST: ${{ github.event.inputs.publish_latest }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
            DEFAULT_PUBLISH_LATEST="true"
          else
            VERSION="sha-${GITHUB_SHA::8}"
            DEFAULT_PUBLISH_LATEST="false"
          fi

          PUBLISH_LATEST="${INPUT_PUBLISH_LATEST:-$DEFAULT_PUBLISH_LATEST}"
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/data-proxy-agent"
          SHORT_SHA="${GITHUB_SHA::12}"

          {
            echo "version=${VERSION}"
            echo "image=${IMAGE_NAME}"
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${VERSION}"
            echo "${IMAGE_NAME}:sha-${SHORT_SHA}"
            if [ "${PUBLISH_LATEST}" = "true" ]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          build-args: |
            VERSION=${{ steps.image.outputs.version }}
          labels: |
            org.opencontainers.image.title=Data Proxy Agent
            org.opencontainers.image.description=Data Proxy tunnel and MCP bridge agent, based on new-api/Data Proxy
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=AGPL-3.0-or-later
            org.opencontainers.image.version=${{ steps.image.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        run: cosign sign --yes ${{ steps.image.outputs.image }}@${{ steps.build.outputs.digest }}

      - name: Image summary
        run: |
          echo "### Data Proxy Agent image" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ steps.image.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: \`${{ steps.image.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Published tags:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.image.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
