name: Data Proxy Agent

permissions:
  contents: read

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/data-proxy-agent.yml"
      - "Dockerfile.agent"
      - "cmd/data-proxy-agent/**"
      - "cmd/dpa/**"
      - "pkg/dpagent/**"
      - "dto/bridge.go"
      - "dto/mcp.go"
      - "go.mod"
      - "go.sum"
      - "LICENSE"
      - "NOTICE"
      - "THIRD-PARTY-LICENSES.md"
      - "README.md"
      - "docs/data-proxy-agent-cli-design.md"
      - "scripts/install-data-proxy-agent.sh"
      - "scripts/notarize-data-proxy-agent.sh"
      - "packaging/data-proxy-agent/**"
  pull_request:
    paths:
      - ".github/workflows/data-proxy-agent.yml"
      - "Dockerfile.agent"
      - "cmd/data-proxy-agent/**"
      - "cmd/dpa/**"
      - "pkg/dpagent/**"
      - "dto/bridge.go"
      - "dto/mcp.go"
      - "go.mod"
      - "go.sum"
      - "LICENSE"
      - "NOTICE"
      - "THIRD-PARTY-LICENSES.md"
      - "README.md"
      - "docs/data-proxy-agent-cli-design.md"
      - "scripts/install-data-proxy-agent.sh"
      - "scripts/notarize-data-proxy-agent.sh"
      - "packaging/data-proxy-agent/**"
  workflow_dispatch:
    inputs:
      publish_agent_image:
        description: "Publish the data-proxy-agent Docker image to GHCR"
        required: false
        default: true
        type: boolean
      publish_latest:
        description: "Also publish ghcr.io/<owner>/data-proxy-agent:latest"
        required: false
        default: false
        type: boolean

concurrency:
  group: data-proxy-agent-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.25.1"
          cache-dependency-path: go.sum

      - name: Download Go modules
        run: go mod download

      - name: Run agent tests
        run: go test ./cmd/dpa ./cmd/data-proxy-agent ./pkg/dpagent ./pkg/bridgepolicy ./pkg/mcpgateway -count=1

      - name: Build smoke
        run: |
          go build -trimpath -o /tmp/dpa ./cmd/dpa
          /tmp/dpa self-test
          /tmp/dpa version

      - name: Check whitespace
        run: git diff --check

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.25.1"
          cache-dependency-path: go.sum

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="sha-${GITHUB_SHA::8}"
          fi
          ARTIFACT="data-proxy-agent-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ steps.meta.outputs.version }}
          ARTIFACT: ${{ steps.meta.outputs.artifact }}
        run: |
          set -euo pipefail
          mkdir -p "dist/${ARTIFACT}"
          BINARY="dpa"
          LEGACY_BINARY="data-proxy-agent"
          if [ "${GOOS}" = "windows" ]; then
            BINARY="${BINARY}.exe"
            LEGACY_BINARY="${LEGACY_BINARY}.exe"
          fi
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/${ARTIFACT}/${BINARY}" \
            ./cmd/dpa
          cp "dist/${ARTIFACT}/${BINARY}" "dist/${ARTIFACT}/${LEGACY_BINARY}"
          cp README.md "dist/${ARTIFACT}/README.md"
          cp docs/data-proxy-agent-cli-design.md "dist/${ARTIFACT}/data-proxy-agent-cli-design.md"
          cp scripts/install-data-proxy-agent.sh "dist/${ARTIFACT}/install-data-proxy-agent.sh"

      - name: Package
        shell: bash
        env:
          ARTIFACT: ${{ steps.meta.outputs.artifact }}
        run: |
          set -euo pipefail
          cd dist
          if [[ "${ARTIFACT}" == *windows* ]]; then
            zip -qr "${ARTIFACT}.zip" "${ARTIFACT}"
            sha256sum "${ARTIFACT}.zip" > "${ARTIFACT}.zip.sha256"
          else
            tar -czf "${ARTIFACT}.tar.gz" "${ARTIFACT}"
            sha256sum "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact }}
          path: dist/${{ steps.meta.outputs.artifact }}.*
          retention-days: 14

  package-linux:
    name: Package Linux ${{ matrix.arch }} ${{ matrix.packager }}
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        packager: [deb, rpm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux archive
        uses: actions/download-artifact@v4
        with:
          name: data-proxy-agent-${{ github.ref_name }}-linux-${{ matrix.arch }}
          path: dist

      - name: Prepare nFPM config
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          mkdir -p dist/extract
          tar -xzf "dist/data-proxy-agent-${VERSION}-linux-${ARCH}.tar.gz" -C dist/extract
          AGENT_PACKAGE_BINARY="$(find "$PWD/dist/extract" -type f -name dpa | head -n 1)"
          if [ -z "${AGENT_PACKAGE_BINARY}" ]; then
            echo "dpa binary not found" >&2
            exit 1
          fi
          AGENT_PACKAGE_LEGACY_BINARY="$(find "$PWD/dist/extract" -type f -name data-proxy-agent | head -n 1)"
          if [ -z "${AGENT_PACKAGE_LEGACY_BINARY}" ]; then
            echo "data-proxy-agent compatibility binary not found" >&2
            exit 1
          fi
          export AGENT_PACKAGE_BINARY
          export AGENT_PACKAGE_LEGACY_BINARY
          export AGENT_PACKAGE_ARCH="${ARCH}"
          export AGENT_PACKAGE_VERSION="${VERSION#v}"
          sed \
            -e "s|\${AGENT_PACKAGE_BINARY}|${AGENT_PACKAGE_BINARY}|g" \
            -e "s|\${AGENT_PACKAGE_LEGACY_BINARY}|${AGENT_PACKAGE_LEGACY_BINARY}|g" \
            -e "s|\${AGENT_PACKAGE_ARCH}|${AGENT_PACKAGE_ARCH}|g" \
            -e "s|\${AGENT_PACKAGE_VERSION}|${AGENT_PACKAGE_VERSION}|g" \
            packaging/data-proxy-agent/nfpm.yaml > dist/nfpm.yaml

      - name: Install nFPM
        shell: bash
        env:
          NFPM_VERSION: v2.47.0
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64|amd64) NFPM_ARCH="x86_64" ;;
            aarch64|arm64) NFPM_ARCH="arm64" ;;
            *)
              echo "unsupported nFPM runner architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac
          VERSION="${NFPM_VERSION#v}"
          curl -fsSL \
            "https://github.com/goreleaser/nfpm/releases/download/${NFPM_VERSION}/nfpm_${VERSION}_Linux_${NFPM_ARCH}.tar.gz" \
            -o /tmp/nfpm.tar.gz
          tar -xzf /tmp/nfpm.tar.gz -C /tmp nfpm
          sudo install -m 0755 /tmp/nfpm /usr/local/bin/nfpm
          nfpm --version

      - name: Build package
        shell: bash
        run: nfpm pkg --config dist/nfpm.yaml --packager ${{ matrix.packager }} --target dist/data-proxy-agent-${{ github.ref_name }}-linux-${{ matrix.arch }}.${{ matrix.packager }}

      - name: Checksum package
        shell: bash
        run: sha256sum dist/data-proxy-agent-${{ github.ref_name }}-linux-${{ matrix.arch }}.${{ matrix.packager }} > dist/data-proxy-agent-${{ github.ref_name }}-linux-${{ matrix.arch }}.${{ matrix.packager }}.sha256

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-proxy-agent-linux-${{ matrix.arch }}-${{ matrix.packager }}
          path: |
            dist/*.${{ matrix.packager }}
            dist/*.${{ matrix.packager }}.sha256
          retention-days: 14

  homebrew-formula:
    name: Generate Homebrew formula
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: data-proxy-agent-${{ github.ref_name }}-*
          merge-multiple: true

      - name: Render formula
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          sha() {
            awk '{print $1}' "dist/data-proxy-agent-${TAG}-$1.tar.gz.sha256"
          }
          cp packaging/data-proxy-agent/homebrew/data-proxy-agent.rb.tmpl dist/data-proxy-agent.rb
          sed -i \
            -e "s/{{TAG}}/${TAG}/g" \
            -e "s/{{VERSION}}/${TAG#v}/g" \
            -e "s/{{DARWIN_AMD64_SHA256}}/$(sha darwin-amd64)/g" \
            -e "s/{{DARWIN_ARM64_SHA256}}/$(sha darwin-arm64)/g" \
            -e "s/{{LINUX_AMD64_SHA256}}/$(sha linux-amd64)/g" \
            -e "s/{{LINUX_ARM64_SHA256}}/$(sha linux-arm64)/g" \
            dist/data-proxy-agent.rb

      - name: Upload formula artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-proxy-agent-homebrew-formula
          path: dist/data-proxy-agent.rb
          retention-days: 14

  windows-msi:
    name: Build Windows MSI ${{ matrix.arch }}
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            wix_arch: x64
          - arch: arm64
            wix_arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows archive
        uses: actions/download-artifact@v4
        with:
          name: data-proxy-agent-${{ github.ref_name }}-windows-${{ matrix.arch }}
          path: dist

      - name: Build MSI
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
          WIX_ARCH: ${{ matrix.wix_arch }}
        run: |
          $ErrorActionPreference = "Stop"
          $version = $env:TAG.TrimStart("v")
          $zip = "dist\data-proxy-agent-$env:TAG-windows-$env:ARCH.zip"
          Expand-Archive -Force -Path $zip -DestinationPath dist\extract
          $agent = Get-ChildItem -Path dist\extract -Filter dpa.exe -Recurse | Select-Object -First 1
          if (-not $agent) { throw "dpa.exe not found" }
          $legacyAgent = Get-ChildItem -Path dist\extract -Filter data-proxy-agent.exe -Recurse | Select-Object -First 1
          if (-not $legacyAgent) { throw "data-proxy-agent.exe not found" }
          dotnet tool install --global wix --version 5.0.2
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          wix --version
          wix build packaging\data-proxy-agent\wix\Product.wxs `
            -arch $env:WIX_ARCH `
            -define ProductVersion=$version `
            -define AgentBinary="$($agent.FullName)" `
            -define AgentLegacyBinary="$($legacyAgent.FullName)" `
            -define LicenseFile="$((Resolve-Path LICENSE).Path)" `
            -define NoticeFile="$((Resolve-Path NOTICE).Path)" `
            -out "dist\data-proxy-agent-$env:TAG-windows-$env:ARCH.msi"
          Get-FileHash "dist\data-proxy-agent-$env:TAG-windows-$env:ARCH.msi" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  data-proxy-agent-$env:TAG-windows-$env:ARCH.msi" } |
            Set-Content "dist\data-proxy-agent-$env:TAG-windows-$env:ARCH.msi.sha256"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-proxy-agent-windows-${{ matrix.arch }}-msi
          path: |
            dist/*.msi
            dist/*.msi.sha256
          retention-days: 14

  notarize-macos:
    name: Notarize macOS ${{ matrix.arch }}
    runs-on: macos-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS archive
        uses: actions/download-artifact@v4
        with:
          name: data-proxy-agent-${{ github.ref_name }}-darwin-${{ matrix.arch }}
          path: dist

      - name: Notarize archive
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          bash scripts/notarize-data-proxy-agent.sh \
            "dist/data-proxy-agent-${TAG}-darwin-${ARCH}.tar.gz" \
            "${TAG}" \
            "${ARCH}" \
            "dist"

      - name: Upload notarized artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-proxy-agent-darwin-${{ matrix.arch }}-notarized
          path: |
            dist/*-notarized.tar.gz
            dist/*-notarized.tar.gz.sha256
          if-no-files-found: ignore
          retention-days: 14

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs:
      - build
      - package-linux
      - homebrew-formula
      - windows-msi
      - notarize-macos
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: data-proxy-agent-*
          merge-multiple: true

      - name: Generate checksum index
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          cat ./*.sha256 > checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksum index with cosign
        shell: bash
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --output-signature dist/checksums.txt.sig \
            --bundle dist/checksums.txt.bundle \
            dist/checksums.txt

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/*.rpm
            dist/*.msi
            dist/*.sha256
            dist/data-proxy-agent.rb
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.bundle

  image:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_agent_image != 'false')
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve image tags
        id: image
        shell: bash
        env:
          INPUT_PUBLISH_LATEST: ${{ github.event.inputs.publish_latest }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
            DEFAULT_PUBLISH_LATEST="true"
          else
            VERSION="sha-${GITHUB_SHA::8}"
            DEFAULT_PUBLISH_LATEST="false"
          fi

          PUBLISH_LATEST="${INPUT_PUBLISH_LATEST:-$DEFAULT_PUBLISH_LATEST}"
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/data-proxy-agent"
          SHORT_SHA="${GITHUB_SHA::12}"

          {
            echo "version=${VERSION}"
            echo "image=${IMAGE_NAME}"
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${VERSION}"
            echo "${IMAGE_NAME}:sha-${SHORT_SHA}"
            if [ "${PUBLISH_LATEST}" = "true" ]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          build-args: |
            VERSION=${{ steps.image.outputs.version }}
          labels: |
            org.opencontainers.image.title=Data Proxy Agent
            org.opencontainers.image.description=Data Proxy tunnel and MCP bridge agent, based on new-api/Data Proxy
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=AGPL-3.0-or-later
            org.opencontainers.image.version=${{ steps.image.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        run: cosign sign --yes ${{ steps.image.outputs.image }}@${{ steps.build.outputs.digest }}

      - name: Image summary
        run: |
          echo "### Data Proxy Agent image" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ steps.image.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: \`${{ steps.image.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Published tags:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.image.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
